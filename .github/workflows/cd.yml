name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: Run CI only (skip deploy jobs)
        required: false
        default: false
        type: boolean
      run_migrations:
        description: Apply Supabase migrations to production DB
        required: false
        default: true
        type: boolean

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend

jobs:
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  migrate-production:
    name: Production — database migrations
    needs: [ci]
    if: >-
      ${{
        (github.event_name == 'push' || inputs.run_migrations) &&
        !inputs.skip_deploy &&
        vars.RUN_PRODUCTION_MIGRATIONS == 'true'
      }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Supabase db push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          DB_URL="${DATABASE_URL/postgresql+asyncpg/postgresql}"
          supabase db push --db-url "$DB_URL"

  publish-backend:
    name: Production — publish backend image
    needs: [ci]
    if: ${{ github.event_name == 'push' && !inputs.skip_deploy }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-frontend-vercel:
    name: Production — deploy frontend (Vercel)
    needs: [ci]
    if: >-
      ${{
        github.event_name == 'push' &&
        !inputs.skip_deploy &&
        vars.VERCEL_DEPLOY_ENABLED == 'true'
      }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Pull Vercel environment
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          scope: ${{ secrets.VERCEL_ORG_ID }}

      - name: Deploy to Vercel (production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: "--prod"
          scope: ${{ secrets.VERCEL_ORG_ID }}

  deploy-backend-webhook:
    name: Production — trigger backend redeploy
    needs: [publish-backend]
    if: >-
      ${{
        github.event_name == 'push' &&
        !inputs.skip_deploy &&
        vars.BACKEND_DEPLOY_WEBHOOK_URL != ''
      }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Trigger hosting provider redeploy
        env:
          DEPLOY_WEBHOOK_URL: ${{ vars.BACKEND_DEPLOY_WEBHOOK_URL }}
        run: |
          curl --fail-with-body -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"sha\":\"${{ github.sha }}\",\"ref\":\"${{ github.ref }}\"}"

  e2e-smoke:
    name: E2E — smoke tests (optional)
    needs: [ci]
    if: ${{ vars.RUN_E2E_SMOKE == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke E2E
        env:
          E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
        run: npm run test:e2e
