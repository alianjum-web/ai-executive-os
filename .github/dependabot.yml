version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    groups:
      backend-runtime:
        patterns:
          - "*"
        exclude-patterns:
          - "pyright*"
          - "pytest*"

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    groups:
      frontend-runtime:
        patterns:
          - "*"
        exclude-patterns:
          - "@types/*"
          - "eslint*"
          - "jest*"
          - "@testing-library/*"
          - "@playwright/*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
